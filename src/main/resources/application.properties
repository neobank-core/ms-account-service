spring.application.name=account-service
spring.datasource.url=jdbc:postgresql://localhost:5434/neobank_accounts
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
server.port=8082
spring.kafka.bootstrap-servers=localhost:9094
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8090/realms/neobank
spring.kafka.consumer.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=account-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

spring.kafka.consumer.properties.spring.json.trusted.packages=org.neobank.accountservice.event
spring.kafka.consumer.properties.spring.json.value.default.type=org.neobank.accountservice.event.UserRegisteredEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
